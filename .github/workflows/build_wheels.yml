name: Build DiSo Wheels

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} for Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04]
        python: ["3.11"]
        cuda: ["12.8.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install CUDA
        uses: Jimver/cuda-toolkit@v0.2.20
        with:
          cuda: ${{ matrix.cuda }}

      - name: Verify CUDA
        run: |
          echo "CUDA_PATH: $CUDA_PATH"
          echo "CUDA_HOME: $CUDA_HOME"
          nvcc --version
          ls -l /usr/local/cuda-12.8/include/cuda_runtime.h || echo "cuda_runtime.h not found"

      - name: Clone DiSo
        uses: actions/checkout@v4
        with:
          repository: SarahWeiii/diso
          path: DiSo

      - name: Build wheel for diso
        env:
          CUDA_HOME: /usr/local/cuda-12.8
          CPATH: /usr/local/cuda-12.8/include
          PATH: /usr/local/cuda-12.8/bin:${{ env.PATH }}
        run: |
          pip install --upgrade pip setuptools wheel
          pip install torch==2.10.0+cu128 --index-url https://download.pytorch.org/whl/cu128
          pip install trimesh numpy
          cd DiSo
          python setup.py bdist_wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diso-wheels-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: DiSo/dist/*.whl
